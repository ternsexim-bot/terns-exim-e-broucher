<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Terns Exim | Dhivya Prakash — Digital Business Card</title>
<style>
  :root{
    --gold-1:#f4d481;
    --gold-2:#e8c05e;
    --gold-3:#9a7424;
    --ink:#0b0b0c;
    --panel:#141414;
    --whatsapp:#25D366;
    --linkedin:#0A66C2;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    background:
      radial-gradient(ellipse at top, #1a1a1a 0%, #050505 60%, #000 100%);
    min-height:100%;
    font-family:'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif;
    color:#f5f2e8;
  }

  .page{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:28px 16px 40px;
    gap:24px;
  }

  /* ---------- Card ---------- */
  .card{
    width:100%;
    border-radius:18px;
    overflow:hidden;
    box-shadow:
      0 0 0 1px rgba(246,217,122,0.25),
      0 25px 60px -15px rgba(0,0,0,0.85),
      0 0 80px -20px rgba(202,161,74,0.35);
    line-height:0;
  }

  .card img{
    display:block;
    width:100%;
    height:auto;
  }

  /* Desktop image visible by default, mobile hidden */
  .img-mobile{display:none;}
  .img-desktop{display:block;}

  .card.layout-desktop{ max-width:1000px; }
  .card.layout-mobile{ max-width:420px; }

  /* ---------- Action panel ---------- */
  .actions-wrap{
    width:100%;
    max-width:1000px;
  }

  .actions-title{
    text-align:center;
    font-size:15px;
    letter-spacing:0.06em;
    color:#e9d9b3;
    margin:0 0 16px;
    font-weight:500;
    font-family:'Georgia','Times New Roman',serif;
    font-style:italic;
    opacity:0.9;
  }

  .actions{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:14px;
  }

  .action{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:13px;
    padding:14px 18px;
    text-decoration:none;
    color:#4a2e05;
    background:linear-gradient(170deg, #f4d481 0%, #e8c05e 100%);
    border:1px solid #b9942f;
    border-radius:8px;
    box-shadow:
      inset 0 1px 2px rgba(255,245,210,0.4),
      inset 0 -2px 3px rgba(120,90,20,0.35),
      0 3px 10px -3px rgba(0,0,0,0.6);
    transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
    text-align:center;
    overflow:hidden;
  }

  .action:hover{
    filter:brightness(1.08);
    box-shadow:
      inset 0 1px 2px rgba(255,235,150,0.7),
      inset 0 -3px 4px rgba(120,75,5,0.4),
      0 6px 18px -4px rgba(0,0,0,0.6);
    transform:translateY(-1px);
  }

  .action:active{
    filter:brightness(0.95);
    transform:translateY(0);
  }

  .action .icon{
    width:34px;
    height:34px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:6px;
    background:linear-gradient(180deg, #2b2410 0%, #15110a 100%);
    border:1px solid rgba(255,255,255,0.08);
    color:#f4d481;
    flex-shrink:0;
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.06);
  }

  .action .icon svg{
    width:17px;
    height:17px;
  }

  .action .text{
    display:flex;
    flex-direction:column;
    align-items:center;
    line-height:1.4;
    min-width:0;
  }

  .action .label{
    font-size:13px;
    font-weight:600;
    letter-spacing:0.01em;
    color:#2c2206;
    font-family:'Georgia', 'Times New Roman', serif;
  }

  .action .sub{
    font-size:11px;
    color:#4a3c18;
    letter-spacing:0.02em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* ---------- Footer ---------- */
  .footer-note{
    text-align:center;
    font-size:11px;
    color:#7d776c;
    letter-spacing:0.08em;
    max-width:1000px;
  }
  .footer-note a{ color:var(--gold-1); text-decoration:none; }

  /* ===================== RESPONSIVE SWAP ===================== */
  @media (max-width: 700px){
    .img-desktop{display:none;}
    .img-mobile{display:block;}

    .card.layout-desktop{display:none;}
    .card.layout-mobile{display:block; max-width:480px;}

    .actions{
      grid-template-columns:repeat(2, 1fr);
      gap:10px;
    }

    .action{
      flex-direction:column;
      gap:6px;
      padding:12px 8px;
    }

    .action .icon{
      width:28px;
      height:28px;
    }

    .action .icon svg{
      width:14px;
      height:14px;
    }

    .action .label{
      font-size:12px;
    }

    .action .sub{
      font-size:10px;
    }
  }

  @media (min-width: 701px){
    .img-mobile{display:none;}
    .img-desktop{display:block;}
    .card.layout-mobile{display:none;}
    .card.layout-desktop{display:block;}
  }

  @media (max-width:380px){
    .actions{ gap:8px; }
    .action{ padding:10px 6px; }
  }
</style>
</head>
